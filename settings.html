<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NOVA OS | Settings</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<main class="settings-page">

    <header class="settings-header">

        <div class="nova-brand">
            NOVA OS
        </div>

        <a href="console.html" class="back-button">
            BACK
        </a>

    </header>


    <section class="settings-content">

        <p class="version">
            NOVA OS CONFIGURATION
        </p>

        <h1>
            SETTINGS
        </h1>

        <div class="settings-card">

            <h2>USER PROFILE</h2>

            <p id="settingsUser">
                Loading user...
            </p>

        </div>


        <div class="settings-card">

            <h2>SYSTEM</h2>

            <p>NOVA OS Version: v0.1</p>

            <p>System Status: ONLINE</p>

        </div>


        <div class="settings-card">

            <h2>VOICE</h2>

            <p>Voice Input: READY</p>

        </div>

    </section>

</main>

</body>

</html>
