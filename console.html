<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NOVA OS | Console</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<main class="nova-interface">

    <header class="nova-header">

        <div class="nova-brand">
            <span class="brand-line"></span>
            <span>NOVA</span>
        </div>

        <div class="system-status">
            <span class="status-dot"></span>
            ONLINE
        </div>

    </header>

    <section class="nova-core">

        <p class="version">NOVA AI CORE</p>

        <h1>NOVA</h1>

        <h2 id="welcomeUser">
            Welcome back...
        </h2>

        <p id="novaStatus">
            Ready when you are.
        </p>

        <button id="voiceButton">
            ACTIVATE
        </button>

        <p class="voice-hint">
            Press to speak with NOVA
        </p>

    </section>

    <section class="command-display">

        <span class="display-label">
            LAST COMMAND
        </span>

        <p id="lastCommand">
            No command yet.
        </p>

    </section>

    <footer class="nova-footer">

        <span>NOVA OS</span>

        <span>AI CORE ACTIVE</span>

    </footer>

</main>

<script src="js/console.js"></script>

</body>
</html>
