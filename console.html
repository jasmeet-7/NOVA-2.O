<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOVA OS | Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head><body><div class="background"></div><main class="nova-dashboard"><header class="dashboard-header">

    <div class="nova-brand">
        NOVA OS
    </div>

    <div class="system-status">

        <span class="status-dot"></span>

        SYSTEM ONLINE

    </div>

</header>


<section class="dashboard-welcome">

    <p class="version">
        PERSONAL OPERATING SYSTEM
    </p>

    <h1 id="welcomeUser">
        Welcome back...
    </h1>

    <p id="currentDate">
        Loading date...
    </p>

</section>


<section class="dashboard-grid">


    <div class="system-card">

        <span class="card-label">
            SYSTEM STATUS
        </span>

        <h2>
            ONLINE
        </h2>

        <p>
            All core systems operational
        </p>

    </div>


    <div class="system-card">

        <span class="card-label">
            VOICE CONTROL
        </span>

        <h2>
            READY
        </h2>

        <p>
            Voice input available
        </p>

    </div>


    <div class="system-card">

        <span class="card-label">
            NOVA CORE
        </span>

        <h2>
            v0.1
        </h2>

        <p>
            Operating system interface
        </p>

    </div>


</section>


<section class="apps-section">

    <h2>
        QUICK ACCESS
    </h2>


    <div class="apps-grid">

        <button class="app-button" id="systemButton">
            SYSTEM
        </button>


        <button class="app-button" id="voiceButton">
            VOICE
        </button>


        <a href="settings.html" class="app-button">
            SETTINGS
        </a>

    </div>

</section>


<footer class="dashboard-footer">

    <span>
        NOVA OS
    </span>

    <span>
        FLOWPILOTT
    </span>

</footer>

</main><script src="js/console.js"></script></body></html>
