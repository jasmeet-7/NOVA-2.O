<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA OS | Console</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<main class="console-container">

    <section class="console-card">

        <div class="console-header">

            <div>
                <p class="version">NOVA AI CORE</p>
                <h1>NOVA</h1>
            </div>

            <div class="online-status">
                <span class="status-dot"></span>
                ONLINE
            </div>

        </div>


        <h2 id="welcomeUser">
            Welcome back...
        </h2>


        <div class="chat-box" id="chatBox">

            <div class="message nova-message">
                Hello, I am NOVA. System ready.
            </div>

        </div>


    <div class="command-area">

    <input 
        type="text"
        id="commandInput"
        placeholder="Ask NOVA anything..."
    >

    <button id="voiceButton">
        MIC
    </button>

    <button id="sendButton">
        SEND
    </button>

</div>

        <div class="activity-box">

            <h3>System Activity</h3>

            <ul id="activityList">
                <li>Core initialized</li>
                <li>Memory loaded</li>
                <li>Awaiting command</li>
            </ul>

        </div>

    </section>

</main>


<script src="js/console.js"></script>

</body>
</html>
